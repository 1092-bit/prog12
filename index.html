<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイ・カー・セレクター</title>
  <style>
    /* CSS: 見た目を整える */
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 400px;
    }

    h1 { color: #333; font-size: 24px; }

    /* セレクトボックスのスタイル */
    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
      outline: none;
    }

    /* 車の表示エリア */
    .car-display {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      background-color: #fafafa;
    }

    .car-emoji {
      font-size: 80px; /* 画像の代わりに絵文字で表現 */
      margin: 0;
    }

    .car-name {
      font-size: 20px;
      font-weight: bold;
      color: #007bff;
      margin: 10px 0;
    }

    .car-description {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚗 車を選んでください</h1>
    
    <select id="carSelect" onchange="updateCar()">
      <option value="none">--- 選択してください ---</option>
      <option value="sport">スポーツカー</option>
      <option value="truck">トラック</option>
      <option value="police">パトカー</option>
      <option value="bus">バス</option>
    </select>

    <div class="car-display" id="displayArea">
      <p class="car-emoji">❓</p>
      <p class="car-name">準備中...</p>
      <p class="car-description">上のメニューから好きな車を選んでみてね！</p>
    </div>
  </div>

  <script>
    /* JavaScript: 動きをつける */
    function updateCar() {
      const select = document.getElementById('carSelect');
      const display = document.getElementById('displayArea');
      const carType = select.value;

      // データの定義（本当は画像URLとかを入れると本格的！）
      const carData = {
        sport: { emoji: "🏎️", name: "スポーツカー", text: "最高速度300km/h！風のように走ります。" },
        truck: { emoji: "🚚", name: "トラック", text: "大きな荷物も楽々！物流のヒーローです。" },
        police: { emoji: "🚓", name: "パトカー", text: "街の平和を守ります。サイレンを鳴らして急行！" },
        bus: { emoji: "🚌", name: "バス", text: "みんなを乗せて出発進行！安全運転が自慢です。" },
        none: { emoji: "❓", name: "準備中...", text: "上のメニューから好きな車を選んでみてね！" }
      };

      const selected = carData[carType];

      // HTMLの中身を書き換える
      display.innerHTML = `
        <p class="car-emoji">${selected.emoji}</p>
        <p class="car-name">${selected.name}</p>
        <p class="car-description">${selected.text}</p>
      `;
    }
  </script>

</body>
</html>
